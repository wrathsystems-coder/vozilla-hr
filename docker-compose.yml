services:
  postgres:
    image: postgres:16-alpine
    container_name: vozilla-hr-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vozilla
      POSTGRES_PASSWORD: vozilla
      POSTGRES_DB: vozilla_hr_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vozilla -d vozilla_hr_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
